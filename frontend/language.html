<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Eco Sentinel - Language Selection</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-secondary-container": "#783916","surface-variant": "#e5e2da","on-tertiary-fixed-variant": "#5c4300","on-error-container": "#93000a","tertiary-fixed": "#ffdfa0","on-tertiary": "#ffffff","error-container": "#ffdad6","inverse-primary": "#88d982","secondary-fixed": "#ffdbcc","tertiary-fixed-dim": "#f8bd2a","on-primary-container": "#cbffc2","surface-container-high": "#ebe8e0","on-tertiary-container": "#ffefd7","primary-fixed": "#a3f69c","on-secondary": "#ffffff","on-primary-fixed-variant": "#005312","on-surface": "#1c1c17","inverse-surface": "#31312b","on-primary-fixed": "#002204","surface-container-highest": "#e5e2da","primary-container": "#2e7d32","on-secondary-fixed-variant": "#733512","tertiary-container": "#8c6800","surface-container": "#f1eee6","secondary-fixed-dim": "#ffb693","on-secondary-fixed": "#351000","outline-variant": "#bfcaba","secondary-container": "#ffa67a","outline": "#707a6c","primary": "#0d631b","on-primary": "#ffffff","on-error": "#ffffff","background": "#fcf9f1","surface-container-lowest": "#ffffff","error": "#ba1a1a","surface-dim": "#dddad2","surface-bright": "#fcf9f1","on-tertiary-fixed": "#261a00","surface-tint": "#1b6d24","surface-container-low": "#f7f3eb","surface": "#fcf9f1","primary-fixed-dim": "#88d982","on-surface-variant": "#40493d","on-background": "#1c1c17","tertiary": "#6e5100","inverse-on-surface": "#f4f0e8","secondary": "#904c27"
        },
        fontFamily: {"headline": ["Plus Jakarta Sans"],"body": ["Be Vietnam Pro"],"label": ["Be Vietnam Pro"]},
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  @keyframes floatLeaf { 0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.2; } 100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity: 0; } }
  .leaf { position: fixed; pointer-events: none; z-index: 0; font-size: 1.5rem; animation: floatLeaf linear infinite; }
  @keyframes ripple { 0% { transform: scale(0); opacity: 0.6; } 100% { transform: scale(4); opacity: 0; } }
  .ripple-circle { position: absolute; border-radius: 50%; background: rgba(13,99,27,0.25); width: 60px; height: 60px; margin-top: -30px; margin-left: -30px; animation: ripple 0.6s linear; pointer-events: none; }
  @keyframes cardEntrance { from { opacity: 0; transform: translateY(24px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .lang-card { animation: cardEntrance 0.5s cubic-bezier(.22,1,.36,1) both; position: relative; overflow: hidden; background: rgba(13,99,27,0.07); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,0.22); transition: transform 0.25s, box-shadow 0.25s, background 0.25s, border-color 0.25s; cursor: pointer; }
  .lang-card:hover { transform: translateY(-6px) scale(1.04); background: rgba(13,99,27,0.14); box-shadow: 0 16px 40px rgba(13,99,27,0.18); border-color: rgba(13,99,27,0.35); }
  .lang-card.selected { background: rgba(13,99,27,0.18); border-color: #0d631b; box-shadow: 0 0 0 3px rgba(13,99,27,0.25), 0 16px 40px rgba(13,99,27,0.2); transform: scale(1.06); }
  .lang-card.selected .check-badge { opacity: 1; transform: scale(1); }
  .check-badge { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; background: #0d631b; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0); transition: opacity 0.2s, transform 0.3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(13,99,27,0.18); } 50% { box-shadow: 0 0 0 18px rgba(13,99,27,0); } }
  .logo-wrap { animation: logoPulse 2.8s ease-in-out infinite; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  .hero-title { animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) 0.1s both; }
  .hero-sub { animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) 0.25s both; }
  .hero-badge { animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) 0.4s both; }
  @keyframes micRing { 0% { box-shadow: 0 0 0 0 rgba(13,99,27,0.35), 0 15px 45px rgba(13,99,27,0.3); } 70% { box-shadow: 0 0 0 20px rgba(13,99,27,0), 0 15px 45px rgba(13,99,27,0.3); } 100% { box-shadow: 0 0 0 0 rgba(13,99,27,0), 0 15px 45px rgba(13,99,27,0.3); } }
  .mic-btn { animation: micRing 2s ease-out infinite; }
  .mic-btn.listening { animation: none; box-shadow: 0 0 0 6px rgba(220,38,38,0.3), 0 15px 45px rgba(220,38,38,0.4); background: #dc2626 !important; }
  @keyframes ctaSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .cta-confirm { display: none; animation: ctaSlideUp 0.4s cubic-bezier(.22,1,.36,1) both; }
  .cta-confirm.visible { display: flex; }
  .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(13,99,27,0.2); transition: background 0.3s, transform 0.3s; }
  .progress-dot.active { background: #0d631b; transform: scale(1.4); }
  @keyframes blobFloat { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-20px) scale(1.05); } 66% { transform: translate(-20px,10px) scale(0.97); } }
  .blob { animation: blobFloat 10s ease-in-out infinite; }
  .blob2 { animation: blobFloat 14s ease-in-out 3s infinite; }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #bfcaba; border-radius: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.8s linear infinite; }
  .loading-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(252,249,241,0.92); backdrop-filter: blur(8px); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .loading-overlay.active { display: flex; }
  @keyframes waveBar { 0%, 100% { height: 6px; } 50% { height: 22px; } }
  .wave-bar { width: 4px; background: #0d631b; border-radius: 4px; animation: waveBar 0.8s ease-in-out infinite; }
</style>
</head>

<body class="bg-background font-body text-on-surface min-h-screen selection:bg-secondary-container selection:text-on-secondary-container overflow-x-hidden">

<div id="leaves-container"></div>
<div class="blob fixed top-[-10%] left-[-5%] w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="blob2 fixed bottom-[10%] right-[-10%] w-[35vw] h-[35vw] bg-secondary-container/5 rounded-full blur-[100px] pointer-events-none"></div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="w-16 h-16 rounded-full border-4 border-primary/20 border-t-primary spinner"></div>
  <p class="font-headline font-bold text-primary text-lg" id="loadingText">Setting up your experience...</p>
</div>

<main class="max-w-7xl mx-auto px-6 sm:px-8 md:px-12 pt-16 pb-48 relative z-10">

  <!-- Hero -->
  <section class="flex flex-col items-center text-center mb-10">
    <div class="logo-wrap mb-6 flex items-center justify-center w-20 h-20 bg-primary/10 rounded-full">
      <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings:'FILL' 1;">psychiatry</span>
    </div>
    <h1 class="hero-title font-headline font-black text-4xl md:text-5xl text-primary uppercase tracking-widest mb-3">Eco Sentinel</h1>
    <p class="hero-sub font-headline font-bold text-xl md:text-2xl text-on-surface-variant max-w-2xl leading-tight mb-4">
      Every seed tells a story, <span class="text-secondary italic">every voice finds a home.</span>
    </p>
    <div class="hero-badge flex items-center gap-3 bg-primary/8 px-5 py-2 rounded-full border border-primary/15">
      <div class="flex gap-1.5 items-center">
        <div class="progress-dot active" id="dot1"></div>
        <div class="progress-dot" id="dot2"></div>
        <div class="progress-dot" id="dot3"></div>
      </div>
      <span class="font-label text-xs font-semibold text-primary uppercase tracking-widest">Step 1 of 3 — Choose your language</span>
    </div>
  </section>

  <!-- Selected banner -->
  <div id="selectedBanner" class="hidden mb-6 flex items-center justify-center gap-3 bg-primary/10 border border-primary/25 rounded-2xl px-6 py-3 max-w-sm mx-auto">
    <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings:'FILL' 1;">check_circle</span>
    <span class="font-headline font-bold text-primary text-sm" id="selectedText">Hindi selected</span>
    <button onclick="clearSelection()" class="ml-auto text-on-surface-variant hover:text-primary transition-colors">
      <span class="material-symbols-outlined text-base">close</span>
    </button>
  </div>

  <!-- Search -->
  <div class="flex items-center gap-3 bg-white/60 border border-primary/15 rounded-2xl px-4 py-3 mb-8 max-w-sm mx-auto shadow-sm">
    <span class="material-symbols-outlined text-primary/60 text-xl">search</span>
    <input id="searchInput" type="text" placeholder="Search language..." class="bg-transparent flex-1 text-sm font-label text-on-surface placeholder:text-on-surface-variant/50 outline-none border-none focus:ring-0" oninput="filterLanguages(this.value)"/>
  </div>

  <!-- Language grid -->
  <section id="languageGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 custom-scrollbar justify-items-center"></section>

  <!-- Voice wave -->
  <div id="voiceWave" class="hidden flex justify-center items-end gap-1 mt-6" style="height:30px;">
    <div class="wave-bar" style="animation-delay:0s;"></div>
    <div class="wave-bar" style="animation-delay:0.1s;"></div>
    <div class="wave-bar" style="animation-delay:0.2s;"></div>
    <div class="wave-bar" style="animation-delay:0.3s;"></div>
    <div class="wave-bar" style="animation-delay:0.15s;"></div>
    <div class="wave-bar" style="animation-delay:0.05s;"></div>
  </div>

</main>

<!-- Fixed footer -->
<footer class="fixed bottom-0 left-0 w-full px-6 sm:px-8 md:px-12 pb-10 pt-12 bg-gradient-to-t from-background via-background/90 to-transparent flex flex-col items-center pointer-events-none z-20">
  <button id="confirmBtn" class="cta-confirm pointer-events-auto items-center gap-4 bg-primary px-10 py-5 rounded-full shadow-[0_15px_45px_0_rgba(13,99,27,0.3)] hover:scale-105 active:scale-95 transition-all duration-300 group mb-4" onclick="confirmLanguage()">
    <span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings:'FILL' 1;">arrow_forward</span>
    <span class="font-headline font-black text-on-primary text-lg uppercase tracking-widest" id="confirmLabel">Continue in Hindi</span>
  </button>
  <button id="micBtn" class="mic-btn pointer-events-auto flex items-center gap-4 bg-primary px-10 py-5 rounded-full hover:scale-105 active:scale-95 transition-all duration-300 group ring-4 ring-tertiary-fixed-dim/20 justify-center" onclick="toggleVoice()">
    <div class="mic-icon-wrap w-12 h-12 bg-on-primary rounded-full flex items-center justify-center group-hover:rotate-12 transition-transform">
      <span class="mic-icon material-symbols-outlined text-primary text-3xl" style="font-variation-settings:'FILL' 1;" id="micIcon">mic</span>
    </div>
    <span class="font-headline font-black text-on-primary text-lg uppercase tracking-widest" id="micLabel">Tap and speak to select</span>
  </button>
  <p class="mt-4 font-label text-[11px] font-bold text-primary/60 uppercase tracking-[0.2em] pointer-events-auto">Powered by AI Regional Voice Engine</p>
</footer>

<script>
const languages = [
  { native: "हिन्दी",    english: "Hindi",     code: "hi" },
  { native: "বাংলা",     english: "Bengali",   code: "bn" },
  { native: "मराठी",    english: "Marathi",   code: "mr" },
  { native: "తెలుగు",   english: "Telugu",    code: "te" },
  { native: "தமிழ்",    english: "Tamil",     code: "ta" },
  { native: "ગુજરાતી",  english: "Gujarati",  code: "gu" },
  { native: "اردو",     english: "Urdu",      code: "ur" },
  { native: "ಕನ್ನಡ",   english: "Kannada",   code: "kn" },
  { native: "ଓଡ଼ିଆ",   english: "Odia",      code: "or" },
  { native: "ਪੰਜਾਬੀ",  english: "Punjabi",   code: "pa" },
  { native: "മലയാളം",  english: "Malayalam", code: "ml" },
  { native: "অসমীয়া",  english: "Assamese",  code: "as" },
  { native: "मैथिली",   english: "Maithili",  code: "mai" },
  { native: "संताली",   english: "Santali",   code: "sat" },
  { native: "کٲشُر",    english: "Kashmiri",  code: "ks" },
  { native: "नेपाली",   english: "Nepali",    code: "ne" },
  { native: "سنڌي",     english: "Sindhi",    code: "sd" },
  { native: "कोंकणी",   english: "Konkani",   code: "kok" },
  { native: "डोगरी",    english: "Dogri",     code: "doi" },
  { native: "ꯃꯤꯇꯩꯂꯣꯟ", english: "Manipuri", code: "mni" },
  { native: "बर'",      english: "Bodo",      code: "brx" },
  { native: "संस्कृतम्", english: "Sanskrit", code: "sa"  },
];

let selectedLang = null;
let isListening = false;

function renderGrid(list) {
  const grid = document.getElementById('languageGrid');
  grid.innerHTML = '';
  list.forEach((lang, i) => {
    const card = document.createElement('div');
    card.className = 'lang-card w-full p-6 rounded-lg flex flex-col items-center justify-center text-center';
    card.style.animationDelay = `${i * 0.04}s`;
    card.dataset.code = lang.code;
    card.innerHTML = `
      <div class="check-badge">
        <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings:'FILL' 1;font-size:14px;">check</span>
      </div>
      <span class="font-headline font-extrabold text-2xl text-primary mb-1">${lang.native}</span>
      <span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">${lang.english}</span>
    `;
    card.addEventListener('click', (e) => selectLanguage(lang, card, e));
    grid.appendChild(card);
  });
}

function selectLanguage(lang, card, e) {
  // Ripple effect
  const ripple = document.createElement('div');
  ripple.className = 'ripple-circle';
  ripple.style.left = (e.offsetX || 60) + 'px';
  ripple.style.top  = (e.offsetY || 40) + 'px';
  card.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);

  document.querySelectorAll('.lang-card.selected').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedLang = lang;

  const banner = document.getElementById('selectedBanner');
  banner.classList.remove('hidden');
  banner.classList.add('flex');
  document.getElementById('selectedText').textContent = `${lang.english} selected`;

  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.classList.add('visible');
  document.getElementById('confirmLabel').textContent = `Continue in ${lang.english}`;

  // ── KEY FIX: save with the key ALL other pages use ──
  localStorage.setItem('cropwise_language', lang.english);
  localStorage.setItem('ecoSentinelLang', JSON.stringify(lang));
}

function clearSelection() {
  document.querySelectorAll('.lang-card.selected').forEach(c => c.classList.remove('selected'));
  selectedLang = null;
  document.getElementById('selectedBanner').classList.add('hidden');
  document.getElementById('selectedBanner').classList.remove('flex');
  document.getElementById('confirmBtn').classList.remove('visible');
  localStorage.removeItem('cropwise_language');
  localStorage.removeItem('ecoSentinelLang');
}

function filterLanguages(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderGrid(languages); return; }
  renderGrid(languages.filter(l => l.english.toLowerCase().includes(q) || l.native.includes(q)));
}

// ── FIXED: No backend call, correct relative path ──
function confirmLanguage() {
  if (!selectedLang) return;

  const overlay = document.getElementById('loadingOverlay');
  document.getElementById('loadingText').textContent = `Setting up ${selectedLang.english} experience...`;
  overlay.classList.add('active');

  // Save language for ALL pages
  localStorage.setItem('cropwise_language', selectedLang.english);
  localStorage.setItem('ecoSentinelLang', JSON.stringify(selectedLang));
  sessionStorage.setItem('confirmedLang', JSON.stringify(selectedLang));

  // ── Navigate to dashboard using RELATIVE path ──
  setTimeout(() => {
    window.location.href = './login.html';
  }, 800);
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice recognition not supported. Please select manually.');
    return;
  }
  isListening ? stopListening() : startListening();
}

function startListening() {
  isListening = true;
  const btn = document.getElementById('micBtn');
  const label = document.getElementById('micLabel');
  const wave = document.getElementById('voiceWave');
  btn.classList.add('listening');
  label.textContent = 'Listening... speak now';
  wave.classList.remove('hidden');
  wave.classList.add('flex');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-IN';

  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript.toLowerCase();
    const match = languages.find(l =>
      l.english.toLowerCase().includes(spoken) || spoken.includes(l.english.toLowerCase())
    );
    if (match) {
      const card = document.querySelector(`[data-code="${match.code}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        selectLanguage(match, card, { offsetX: 60, offsetY: 40 });
      }
    }
    stopListening();
  };

  recognition.onerror = () => stopListening();
  recognition.onend   = () => stopListening();
  recognition.start();
}

function stopListening() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micLabel').textContent = 'Tap and speak to select';
  const wave = document.getElementById('voiceWave');
  wave.classList.add('hidden');
  wave.classList.remove('flex');
}

// Floating leaves
function spawnLeaf() {
  const container = document.getElementById('leaves-container');
  const icons = ['eco', 'grass', 'yard', 'park', 'forest'];
  const leaf = document.createElement('div');
  leaf.className = 'leaf material-symbols-outlined';
  leaf.textContent = icons[Math.floor(Math.random() * icons.length)];
  leaf.style.left = Math.random() * 100 + 'vw';
  leaf.style.animationDuration = (12 + Math.random() * 10) + 's';
  leaf.style.animationDelay = (Math.random() * 4) + 's';
  leaf.style.fontSize = (16 + Math.random() * 14) + 'px';
  leaf.style.color = `rgba(13,99,27,${0.08 + Math.random() * 0.12})`;
  leaf.style.fontVariationSettings = "'FILL' 1";
  container.appendChild(leaf);
  setTimeout(() => leaf.remove(), 22000);
}

setInterval(spawnLeaf, 1800);
for (let i = 0; i < 5; i++) setTimeout(spawnLeaf, i * 600);

renderGrid(languages);

// Restore previous selection if any
const saved = localStorage.getItem('ecoSentinelLang');
if (saved) {
  try {
    const lang = JSON.parse(saved);
    setTimeout(() => {
      const card = document.querySelector(`[data-code="${lang.code}"]`);
      if (card) selectLanguage(lang, card, { offsetX: 60, offsetY: 40 });
    }, 600);
  } catch(e) {}
}
</script>
</body>
</html>
